# LangGraph Agent — RayService with FastAPI + LangGraph multi-agent workflows
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: langgraph-serve
  namespace: argocd
  labels:
    stack: ai
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/tylertitsworth/ai-cluster.git
    targetRevision: graphserve
    path: charts/langgraph-serve
  destination:
    server: https://kubernetes.default.svc
    namespace: langgraph-serve
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
