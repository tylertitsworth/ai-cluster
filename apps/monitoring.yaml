# kube-prometheus-stack - Monitoring Stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  labels:
    stack: monitoring
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 66.3.1
      helm:
        valueFiles:
          - $values/apps/monitoring-values.yaml
        valuesObject:
          grafana:
            persistence:
              existingClaim: grafana
    - repoURL: https://github.com/tylertitsworth/ai-cluster.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  syncPolicy:
    # Auto-sync disabled - manual sync only
    # automated:
    #   prune: true
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=true
