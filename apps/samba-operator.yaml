# Samba Operator - SMB shares on PVCs
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: samba-operator
  namespace: argocd
  labels:
    stack: storage
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/samba-in-kubernetes/samba-operator.git
    targetRevision: v0.8
    path: config/default
  destination:
    server: https://kubernetes.default.svc
    namespace: samba-operator-system
  syncPolicy:
    # Auto-sync disabled - manual sync only
    # automated:
    #   prune: true
    #   selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
