# https://github.com/longhorn/longhorn/tree/master/chart
defaultSettings:
  defaultDataPath: /storage
ingress:
  enabled: true
  host: longhorn
  ingressClassName: tailscale
  tls: true
  tlsSecret:
  annotations:
    tailscale.com/proxy-class: pin-npu01
metrics:
  serviceMonitor:
    enabled: true
    additionalLabels:
      prometheus: monitoring-kube-prometheus-prometheus
      release: monitoring
  enabled: true
service:
  ui:
    type: LoadBalancer
    loadBalancerIP: 192.168.0.81
