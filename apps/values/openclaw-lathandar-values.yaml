instance:
  name: openclaw-lathandar

models:
  defaultModel:
    primary: aperture/gpt-5.4
    fallbacks: []
  providers:
    aperture:
      api: openai-responses
      baseUrl: https://ai.tail79a5c8.ts.net/v1
      apiKey: internal-noauth-key
      models:
        - id: gpt-5.4
          name: gpt-5.4
          api: openai-responses
        - id: gpt-5.3-codex
          name: gpt-5.3-codex
          api: openai-responses
    ollama:
      api: ollama
      baseUrl: http://ollama.ollama.svc.cluster.local:11434
      apiKey: internal-noauth-key
      models:
        - id: nemotron-3-nano-30b-full:latest
          name: nemotron-3-nano-30b-full:latest
          api: ollama

discord:
  enabled: true
  configWrites: false
  tokenEnvVar: ""
  actions:
    presence: true
  activity: "🐉"
  status: online
  accounts: {}

gatewayRaw:
  controlUi:
    dangerouslyDisableDeviceAuth: false
    allowedOrigins:
      - http://127.0.0.1:18789
      - http://localhost:18789
      - https://openclaw-lathandar
      - https://openclaw-lathandar.tail79a5c8.ts.net

hooksRaw:
  internal:
    enabled: true

sessionRaw:
  resetByType:
    group:
      mode: idle
      idleMinutes: 90

messagesRaw:
  queue:
    mode: steer
  ackReaction: "👀"
  ackReactionScope: all
  removeAckAfterReply: true
  statusReactions:
    enabled: true
    emojis:
      thinking: "🧠"
      tool: "💻"
      done: "✅"

toolsRaw:
  web:
    search:
      enabled: true
      provider: brave
      apiKey: ${BRAVE_API_KEY}
  agentToAgent:
    enabled: true
    allow:
      - main
      - nhp
      - volo
      - colville
  sessions:
    visibility: all

env:
  - name: CONTEXT7_API_KEY
    valueFrom:
      secretKeyRef:
        name: openclaw-lathandar-provider-secrets
        key: CONTEXT7_API_KEY
        optional: true

workspace:
  initialDirectories:
    - lathandar
    - nhp
    - volo
    - colville

networking:
  ingress:
    enabled: true
    className: tailscale
    annotations:
      tailscale.com/proxy-class: control-plane
    hosts:
      - host: openclaw-lathandar
        paths:
          - path: /
            pathType: Prefix
            port: 18789
    tls:
      - hosts:
          - openclaw-lathandar

security:
  networkPolicy:
    enabled: true
    allowedIngressNamespaces:
      - openclaw
      - tailscale
    additionalEgress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: tailscale
        ports:
          - protocol: TCP
            port: 443
          - protocol: TCP
            port: 10557
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: ollama
        ports:
          - protocol: TCP
            port: 11434

probes:
  startup:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 120
  readiness:
    # /readyz currently tracks downstream channel health (e.g. Discord connectivity)
    # and can remain false even when gateway HTTP is serving.
    enabled: false
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  liveness:
    enabled: true
    initialDelaySeconds: 45
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
