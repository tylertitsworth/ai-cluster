instance:
  name: openclaw-lathandar

models:
  defaultModel:
    primary: aperture/gpt-5.4
    fallbacks: []
  providers:
    aperture:
      api: openai-responses
      baseUrl: https://ai.tail79a5c8.ts.net/v1
      apiKey: internal-noauth-key
      models:
        - id: gpt-5.4
          name: gpt-5.4
          api: openai-responses
        - id: gpt-5.3-codex
          name: gpt-5.3-codex
          api: openai-responses
    ollama:
      api: ollama
      baseUrl: http://ollama.ollama.svc.cluster.local:11434
      apiKey: internal-noauth-key
      models:
        - id: nemotron-3-nano-30b-full:latest
          name: nemotron-3-nano-30b-full:latest
          api: ollama

discord:
  enabled: true
  configWrites: false
  tokenEnvVar: ""
  actions:
    presence: true
  activity: "🐉"
  status: online
  accounts: {}

gatewayRaw:
  controlUi:
    dangerouslyDisableDeviceAuth: false
    allowedOrigins:
      - http://127.0.0.1:18789
      - http://localhost:18789
      - https://openclaw-lathandar
      - https://openclaw-lathandar.tail79a5c8.ts.net

hooksRaw:
  internal:
    enabled: true

sessionRaw:
  resetByType:
    group:
      mode: idle
      idleMinutes: 90

messagesRaw:
  queue:
    mode: steer
  ackReaction: "👀"
  ackReactionScope: all
  removeAckAfterReply: true
  statusReactions:
    enabled: true
    emojis:
      thinking: "🧠"
      tool: "💻"
      done: "✅"

toolsRaw:
  web:
    search:
      enabled: true
      provider: brave
      apiKey: ${BRAVE_API_KEY}
  agentToAgent:
    enabled: true
    allow:
      - main
      - nhp
      - volo
      - colville
  sessions:
    visibility: all

env:
  - name: CONTEXT7_API_KEY
    valueFrom:
      secretKeyRef:
        name: openclaw-lathandar-provider-secrets
        key: CONTEXT7_API_KEY
        optional: true

initContainers:
  - name: init-skills-force
    image: ghcr.io/openclaw/openclaw:latest
    command:
      - sh
      - -c
      - |
        set -e
        export HOME=/tmp
        export NPM_CONFIG_CACHE=/tmp/.npm
        export NPM_CONFIG_PREFIX=/home/openclaw/.openclaw/.local
        export NPM_CONFIG_IGNORE_SCRIPTS=true
        mkdir -p /home/openclaw/.openclaw/skills
        _install() {
          skill="$1"
          skill_dir="/home/openclaw/.openclaw/skills/$skill"
          # Fast path for restarts: do not hit ClawHub if files already exist.
          if [ -d "$skill_dir" ]; then
            echo "Skill $skill already present at $skill_dir, skipping"
            return 0
          fi
          max_attempts=12
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            output=$(npx -y clawhub --no-input --workdir /home/openclaw/.openclaw --dir skills install "$skill" --force 2>&1) && {
              echo "$output"
              return 0
            }
            if echo "$output" | grep -q "Already installed"; then
              echo "Skill $skill already installed, skipping"
              return 0
            fi
            if echo "$output" | grep -qi "Rate limit exceeded"; then
              sleep_seconds=$((attempt < 6 ? attempt * 2 : 15))
              echo "Rate limited installing $skill (attempt $attempt/$max_attempts); retrying in ${sleep_seconds}s"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              continue
            fi
            echo "$output" >&2
            return 1
          done
          echo "Failed to install $skill after $max_attempts attempts due to repeated rate limits" >&2
          return 1
        }
        _install superpowers
        _install context7-api
    envFrom:
      - secretRef:
          name: openclaw-lathandar-provider-secrets
      - secretRef:
          name: openclaw-lathandar-discord-secrets
    env:
      - name: HOME
        value: /tmp
      - name: NPM_CONFIG_CACHE
        value: /tmp/.npm
      - name: NPM_CONFIG_PREFIX
        value: /home/openclaw/.openclaw/.local
      - name: NPM_CONFIG_IGNORE_SCRIPTS
        value: "true"
    volumeMounts:
      - name: data
        mountPath: /home/openclaw/.openclaw
      - name: tmp
        mountPath: /tmp

workspace:
  initialDirectories:
    - lathandar
    - nhp
    - volo
    - colville

networking:
  ingress:
    enabled: true
    className: tailscale
    annotations:
      tailscale.com/proxy-class: control-plane
    hosts:
      - host: openclaw-lathandar
        paths:
          - path: /
            pathType: Prefix
            port: 18789
    tls:
      - hosts:
          - openclaw-lathandar

security:
  networkPolicy:
    enabled: true
    allowedIngressNamespaces:
      - openclaw
      - tailscale
    additionalEgress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: tailscale
        ports:
          - protocol: TCP
            port: 443
          - protocol: TCP
            port: 10557
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: ollama
        ports:
          - protocol: TCP
            port: 11434

probes:
  startup:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 120
  readiness:
    # /readyz currently tracks downstream channel health (e.g. Discord connectivity)
    # and can remain false even when gateway HTTP is serving.
    enabled: false
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  liveness:
    enabled: true
    initialDelaySeconds: 45
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
