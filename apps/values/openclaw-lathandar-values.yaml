instance:
  name: openclaw-lathandar

agents:
  main:
    id: main
    name: Lathandar
    workspace: /home/openclaw/.openclaw/workspace/lathandar
    model:
      primary: aperture/gpt-5.3-codex
      fallbacks:
        - aperture/gpt-5.4
  subagents:
    - id: nhp
      name: NHP
      workspace: /home/openclaw/.openclaw/workspace/nhp
    - id: volo
      name: Volo
      workspace: /home/openclaw/.openclaw/workspace/volo
    - id: colville
      name: Colville
      workspace: /home/openclaw/.openclaw/workspace/colville

models:
  defaultModel:
    primary: aperture/gpt-5.4
    fallbacks: []
  providers:
    aperture:
      api: openai-responses
      baseUrl: https://ai.tail79a5c8.ts.net/v1
      apiKey: internal-noauth-key
      models:
        - id: gpt-5.4
          name: gpt-5.4
          api: openai-responses
        - id: gpt-5.3-codex
          name: gpt-5.3-codex
          api: openai-responses
    ollama:
      api: ollama
      baseUrl: http://ollama.ollama.svc.cluster.local:11434
      apiKey: internal-noauth-key
      models:
        - id: nemotron-3-nano-30b-full:latest
          name: nemotron-3-nano-30b-full:latest
          api: ollama

discord:
  enabled: true
  configWrites: false
  tokenEnvVar: DISCORD_TOKEN_DEFAULT
  groupPolicy: allowlist
  streaming: block
  accounts:
    lathandar:
      name: Lathandar
      tokenEnvVar: DISCORD_TOKEN_DEFAULT
      commands:
        native: false
      dmPolicy: allowlist
      dm:
        allowFrom:
          - "*"
      allowFrom:
        - "*"
      groupPolicy: allowlist
      streaming: block
      guilds:
        "501818463090638859":
          requireMention: true
          channels:
            "1467730720402309262":
              allow: true
              requireMention: true
    nhp:
      name: NHP
      tokenEnvVar: DISCORD_TOKEN_NHP
      commands:
        native: false
      dmPolicy: allowlist
      dm:
        allowFrom:
          - "*"
      allowFrom:
        - "*"
      groupPolicy: allowlist
      streaming: block
      guilds:
        "501818463090638859":
          requireMention: true
          channels:
            "1467730720402309262":
              allow: true
              requireMention: true
    volo:
      name: Volo
      tokenEnvVar: DISCORD_TOKEN_VOLO
      commands:
        native: false
      dmPolicy: allowlist
      dm:
        allowFrom:
          - "*"
      allowFrom:
        - "*"
      groupPolicy: allowlist
      streaming: block
      guilds:
        "501818463090638859":
          requireMention: true
          channels:
            "1467730720402309262":
              allow: true
              requireMention: true
    colville:
      name: Colville
      tokenEnvVar: DISCORD_TOKEN_COLVILLE
      commands:
        native: false
      dmPolicy: allowlist
      dm:
        allowFrom:
          - "*"
      allowFrom:
        - "*"
      groupPolicy: allowlist
      streaming: block
      guilds:
        "501818463090638859":
          requireMention: true
          channels:
            "1467730720402309262":
              allow: true
              requireMention: true
  bindings:
    - agentId: main
      match:
        channel: discord
        accountId: lathandar
    - agentId: nhp
      match:
        channel: discord
        accountId: nhp
    - agentId: volo
      match:
        channel: discord
        accountId: volo
    - agentId: colville
      match:
        channel: discord
        accountId: colville

gatewayRaw:
  controlUi:
    allowedOrigins:
      - http://127.0.0.1:18789
      - http://localhost:18789
      - https://openclaw-lathandar
      - https://openclaw-lathandar.tail79a5c8.ts.net

hooksRaw:
  internal:
    enabled: true
    entries:
      boot-md:
        enabled: false

sessionRaw:
  resetByType:
    group:
      mode: idle
      idleMinutes: 90

workspace:
  initialDirectories:
    - lathandar
    - nhp
    - volo
    - colville
  initialFiles:
    BOOT.md: |
      # BOOT.md — Startup Instructions
      
      On every gateway startup, do the following:
      
      1. Use the message tool to message Tyler on Discord (channel 1465586524098658417):
         - Say you just started up (restarted/booted)
         - Include the current time in PT
         - Note the OpenClaw version (`cd /app && node dist/index.js --version`)
         - Keep it short — one or two lines
      
      2. After sending, reply with NO_REPLY.

networking:
  ingress:
    enabled: true
    className: tailscale
    annotations:
      tailscale.com/proxy-class: control-plane
    hosts:
      - host: openclaw-lathandar
        paths:
          - path: /
            pathType: Prefix
            port: 18789
    tls:
      - hosts:
          - openclaw-lathandar

security:
  networkPolicy:
    enabled: true
    allowedIngressNamespaces:
      - openclaw
      - tailscale
    additionalEgress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: tailscale
        ports:
          - protocol: TCP
            port: 443
          - protocol: TCP
            port: 10557
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: ollama
        ports:
          - protocol: TCP
            port: 11434

probes:
  startup:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 120
  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  liveness:
    enabled: true
    initialDelaySeconds: 45
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
