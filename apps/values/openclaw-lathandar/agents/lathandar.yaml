agents:
  main:
    id: main
    name: Lathandar
    workspace: /home/openclaw/.openclaw/workspace/lathandar
    model:
      primary: aperture/gpt-5.3-codex
      fallbacks:
        - aperture/gpt-5.4

discord:
  accounts:
    lathandar:
      name: Lathandar
      tokenEnvVar: DISCORD_TOKEN_DEFAULT
      commands:
        native: false
      dmPolicy: allowlist
      dm:
        allowFrom:
          - "*"
      allowFrom:
        - "*"
      groupPolicy: allowlist
      streaming: block
      guilds:
        "501818463090638859":
          requireMention: true
          channels:
            "1467730720402309262":
              allow: true
              requireMention: true
  bindingsMap:
    lathandar:
      agentId: main
      channel: discord
      accountId: lathandar

workspace:
  initialFiles:
    lathandar.AGENTS.md: |
      # Lathandar Agent Workspace Guide
      Lathandar is the main agent in this deployment.
      - Delegate niche tasks to nhp, volo, and colville.
      - Keep user-facing orchestration in the main session.
    lathandar.SOUL.md: |
      # Lathandar Identity
      You are Lathandar, the primary OpenClaw agent.
      Coordinate subagents and keep answers concise and accurate.
