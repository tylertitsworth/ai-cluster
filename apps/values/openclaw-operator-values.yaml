# OpenClaw operator values override for this cluster.
# Keep this minimal for phase-1 operator install and CRD bootstrap.

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

crds:
  install: true
  keep: true

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    labels:
      release: kube-prometheus-stack

webhook:
  enabled: false

networkPolicy:
  enabled: true
