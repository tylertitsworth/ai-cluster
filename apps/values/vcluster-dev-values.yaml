# vcluster "dev" — virtual cluster for dev/test isolation
# Chart: loft/vcluster (https://charts.loft.sh)
# Docs: https://www.vcluster.com/docs/vcluster/configure/vcluster-yaml/

controlPlane:
  # Use vanilla k8s distribution (k3s is deprecated in vcluster >=0.25)
  distro:
    k8s:
      enabled: true

  # OSS image — default is vcluster-pro, override to vcluster-oss
  statefulSet:
    image:
      registry: ghcr.io
      repository: loft-sh/vcluster-oss

  # SQLite embedded database (etcd embedded is Pro-only)
  backingStore:
    database:
      embedded:
        enabled: true

  # Tailscale LoadBalancer service for API server access over the Tailnet.
  # LoadBalancer (L4) is required — Ingress (L7) terminates TLS and strips
  # kubectl client certificates, causing "Forbidden" errors.
  service:
    spec:
      type: LoadBalancer
      loadBalancerClass: tailscale
    annotations:
      tailscale.com/proxy-class: "control-plane"
      tailscale.com/hostname: "vcluster-dev"

  # Add Tailscale FQDN to the API server TLS certificate SANs
  proxy:
    extraSANs:
      - vcluster-dev.tail79a5c8.ts.net

# Sync host nodes into the vcluster so device resources (GPU, NPU) are visible.
# To restrict to specific hardware, uncomment and set selector.labels:
#   node-type: jetson   → GPU-only (nvidia.com/gpu)
#   node-type: npu      → NPU-only (rockchip.com/npu)
sync:
  fromHost:
    nodes:
      enabled: true
      # selector:
      #   labels:
      #     node-type: jetson
