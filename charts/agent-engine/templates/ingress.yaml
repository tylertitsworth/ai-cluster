{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agent-engine.fullname" . }}
  labels:
    {{- include "agent-engine.labels" . | nindent 4 }}
    {{- with .Values.ingress.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - backend:
              service:
                name: {{ include "agent-engine.fullname" . }}-serve-svc
                port:
                  number: 8000
            path: {{ .Values.serve.routePrefix }}
            pathType: Prefix
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
{{- end }}
