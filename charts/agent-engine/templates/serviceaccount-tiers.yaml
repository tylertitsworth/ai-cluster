{{- range $tierName, $tierConfig := .Values.tiers }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agent-engine.fullname" $ }}-{{ $tierName }}
  labels:
    {{- include "agent-engine.labels" $ | nindent 4 }}
---
{{- if eq $tierName "k8s-access" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agent-engine.fullname" $ }}-{{ $tierName }}
  labels:
    {{- include "agent-engine.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, services, events, configmaps]
    verbs: [get, list, watch, create, patch, delete]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, list]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agent-engine.fullname" $ }}-{{ $tierName }}
  labels:
    {{- include "agent-engine.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agent-engine.fullname" $ }}-{{ $tierName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-engine.fullname" $ }}-{{ $tierName }}
    namespace: {{ $.Release.Namespace }}
---
{{- end }}
{{- end }}
