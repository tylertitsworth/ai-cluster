name: example
description: Summarizer distills user input, executor carries out the task using Kubernetes read-only tools.
tier: k8s-access

providers:
  openai:
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    model: ${OPENAI_MODEL}
  ollama:
    base_url: ${OLLAMA_BASE_URL}
    api_key: not-needed
    model: ${OLLAMA_MODEL}

tools:
  k8s-reader:
    type: mcp
    url: http://kubernetes-mcp-server.kubernetes-mcp.svc.cluster.local:8080/mcp
    transport: streamable_http

agents:
  summarizer:
    provider: openai
    prompt: summarizer

  executor:
    provider: openai
    prompt: executor
    tools: [k8s-reader]

flow:
  - step: summarizer
  - step: executor
    tool_loop: 10
