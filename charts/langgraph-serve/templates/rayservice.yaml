apiVersion: ray.io/v1
kind: RayService
metadata:
  name: {{ include "langgraph-serve.fullname" . }}
  labels:
    {{- include "langgraph-serve.labels" . | nindent 4 }}
spec:
  serviceUnhealthySecondThreshold: 300
  deploymentUnhealthySecondThreshold: 300
  serveConfigV2: |
    applications:
      - name: langgraph-agent
        route_prefix: {{ .Values.serve.routePrefix }}
        import_path: serve:app
        deployments:
          - name: LangGraphService
            num_replicas: {{ .Values.serve.numReplicas }}
            ray_actor_options:
              num_cpus: 0
  rayClusterConfig:
    rayVersion: {{ .Values.rayVersion | quote }}
    {{- if .Values.autoscaler.enabled }}
    enableInTreeAutoscaling: true
    autoscalerOptions:
      upscalingMode: {{ .Values.autoscaler.upscalingMode }}
      idleTimeoutSeconds: {{ .Values.autoscaler.idleTimeoutSeconds }}
    {{- end }}
    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: {{ .Values.head.cpus | quote }}
      template:
        spec:
          {{- with .Values.head.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: {{ include "langgraph-serve.fullname" . }}-data
            {{- range .Values.prompts.workflows }}
            - name: prompts-{{ .name }}
              configMap:
                name: {{ include "langgraph-serve.fullname" $ }}-prompts-{{ .name }}
            {{- end }}
          containers:
            - name: ray-head
              image: {{ include "langgraph-serve.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: OLLAMA_BASE_URL
                  value: {{ .Values.ollama.baseUrl | quote }}
                - name: OLLAMA_MODEL
                  value: {{ .Values.ollama.model | quote }}
                - name: OPENAI_BASE_URL
                  value: {{ .Values.openai.baseUrl | quote }}
                - name: OPENAI_MODEL
                  value: {{ .Values.openai.model | quote }}
                - name: OPENAI_API_KEY
                  value: {{ .Values.openai.apiKey | quote }}
                - name: CHECKPOINT_DB
                  value: {{ .Values.checkpoint.path | quote }}
              volumeMounts:
                - name: data
                  mountPath: /data
                {{- range .Values.prompts.workflows }}
                - name: prompts-{{ .name }}
                  mountPath: /prompts/{{ .name }}
                {{- end }}
              resources:
                {{- toYaml .Values.head.resources | nindent 16 }}
              ports:
                - containerPort: 6379
                  name: gcs
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
    workerGroupSpecs:
      - groupName: compute
        replicas: 0
        minReplicas: {{ .Values.worker.minReplicas }}
        maxReplicas: {{ .Values.worker.maxReplicas }}
        rayStartParams: {}
        template:
          spec:
            {{- with .Values.worker.nodeSelector }}
            nodeSelector:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: {{ include "langgraph-serve.fullname" . }}-data
              {{- range .Values.prompts.workflows }}
              - name: prompts-{{ .name }}
                configMap:
                  name: {{ include "langgraph-serve.fullname" $ }}-prompts-{{ .name }}
              {{- end }}
            containers:
              - name: ray-worker
                image: {{ include "langgraph-serve.image" . }}
                imagePullPolicy: {{ .Values.image.pullPolicy }}
                env:
                  - name: OLLAMA_BASE_URL
                    value: {{ .Values.ollama.baseUrl | quote }}
                  - name: OLLAMA_MODEL
                    value: {{ .Values.ollama.model | quote }}
                  - name: OPENAI_BASE_URL
                    value: {{ .Values.openai.baseUrl | quote }}
                  - name: OPENAI_MODEL
                    value: {{ .Values.openai.model | quote }}
                  - name: OPENAI_API_KEY
                    value: {{ .Values.openai.apiKey | quote }}
                  - name: CHECKPOINT_DB
                    value: {{ .Values.checkpoint.path | quote }}
                volumeMounts:
                  - name: data
                    mountPath: /data
                  {{- range .Values.prompts.workflows }}
                  - name: prompts-{{ .name }}
                    mountPath: /prompts/{{ .name }}
                  {{- end }}
                resources:
                  {{- toYaml .Values.worker.resources | nindent 18 }}
