image:
  repository: totalsundae/dev
  tag: langserve
  pullPolicy: Always

rayVersion: "2.54.0"

ollama:
  baseUrl: "http://ollama.ollama.svc.cluster.local:11434"
  model: "nemotron-3-nano-30b-full"

openai:
  baseUrl: "https://ai.tail79a5c8.ts.net/v1"
  model: "gpt-5.4"
  apiKey: "not-needed"

checkpoint:
  storage: 2Gi
  path: /data/checkpoints.db

head:
  cpus: "1"
  resources:
    limits:
      cpu: "2"
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 4Gi
  nodeSelector:
    kubernetes.io/hostname: framework-desktop

worker:
  minReplicas: 0
  maxReplicas: 5
  resources:
    limits:
      cpu: "1"
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 4Gi
  nodeSelector:
    kubernetes.io/hostname: framework-desktop

autoscaler:
  enabled: true
  upscalingMode: Default
  idleTimeoutSeconds: 60

ingress:
  enabled: true
  className: tailscale
  host: langgraph
  labels:
    tailscale.com/proxy-class: control-plane

serve:
  routePrefix: /serve
  numReplicas: 1

prompts:
  workflows:
    - name: example
      path: example
    - name: service-debugger
      path: service_debugger
