{{- $values := .Values -}}
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: {{ include "openclaw-agent-instance.fullname" . }}
spec:
  envFrom:
    - secretRef:
        name: {{ include "openclaw-agent-instance.providerSecretName" . | quote }}
    - secretRef:
        name: {{ include "openclaw-agent-instance.discordSecretName" . | quote }}
  {{- if $values.env }}
  env:
    {{- toYaml $values.env | nindent 4 }}
  {{- end }}

  gateway:
    existingSecret: {{ include "openclaw-agent-instance.gatewayTokenSecretName" . | quote }}

  config:
    mergeMode: overwrite
    raw:
      agents:
        defaults:
          workspace: "/home/openclaw/.openclaw/workspace"
          {{- if $values.models.defaultModel }}
          {{- if kindIs "string" $values.models.defaultModel }}
          model: {{ $values.models.defaultModel | quote }}
          {{- else }}
          model:
            {{ toYaml $values.models.defaultModel | nindent 12 }}
          {{- end }}
          {{- end }}
        list:
          - id: {{ $values.agents.main.id | quote }}
            name: {{ $values.agents.main.name | quote }}
            workspace: {{ $values.agents.main.workspace | quote }}
            {{- if $values.agents.main.model }}
            {{- if kindIs "string" $values.agents.main.model }}
            model: {{ $values.agents.main.model | quote }}
            {{- else }}
            model:
              {{ toYaml $values.agents.main.model | nindent 14 }}
            {{- end }}
            {{- end }}
        {{- range $values.agents.subagents }}
          - id: {{ .id | quote }}
            name: {{ .name | quote }}
            workspace: {{ .workspace | quote }}
            {{- if .model }}
            {{- if kindIs "string" .model }}
            model: {{ .model | quote }}
            {{- else }}
            model:
              {{ toYaml .model | nindent 14 }}
            {{- end }}
            {{- end }}
        {{- end }}
        {{- range $id := keys $values.agents.subagentsMap | sortAlpha }}
        {{- $cfg := index $values.agents.subagentsMap $id }}
          - id: {{ default $id $cfg.id | quote }}
            name: {{ $cfg.name | quote }}
            workspace: {{ $cfg.workspace | quote }}
            {{- if $cfg.model }}
            {{- if kindIs "string" $cfg.model }}
            model: {{ $cfg.model | quote }}
            {{- else }}
            model:
              {{ toYaml $cfg.model | nindent 14 }}
            {{- end }}
            {{- end }}
        {{- end }}
        {{- if $values.models.providers }}
      models:
        providers:
          {{- toYaml $values.models.providers | nindent 10 }}
        {{- end }}

      bindings:
      {{- if $values.discord.bindings }}
        {{ toYaml $values.discord.bindings | nindent 8 }}
      {{- end }}
      {{- range $id := keys $values.discord.bindingsMap | sortAlpha }}
      {{- $binding := index $values.discord.bindingsMap $id }}
        - agentId: {{ default $id $binding.agentId | quote }}
          match:
            channel: {{ default "discord" $binding.channel | quote }}
            accountId: {{ $binding.accountId | quote }}
      {{- end }}
      {{- if and (not $values.discord.bindings) (eq (len $values.discord.bindingsMap) 0) }}
        []
      {{- end }}

      channels:
        discord:
          enabled: {{ $values.discord.enabled }}
          {{- if ne $values.discord.configWrites nil }}
          configWrites: {{ $values.discord.configWrites }}
          {{- end }}
          {{- if $values.discord.defaultAccount }}
          defaultAccount: {{ $values.discord.defaultAccount | quote }}
          {{- end }}
          {{- if ne $values.discord.blockStreaming nil }}
          blockStreaming: {{ $values.discord.blockStreaming }}
          {{- end }}
          {{- if $values.discord.tokenEnvVar }}
          token: {{ printf "${%s}" $values.discord.tokenEnvVar | quote }}
          {{- end }}
          {{- if $values.discord.groupPolicy }}
          groupPolicy: {{ $values.discord.groupPolicy | quote }}
          {{- end }}
          {{- if $values.discord.streaming }}
          streaming: {{ $values.discord.streaming | quote }}
          {{- end }}
          {{- if $values.discord.actions }}
          actions:
            {{- toYaml $values.discord.actions | nindent 12 }}
          {{- end }}
          {{- if $values.discord.activity }}
          activity: {{ $values.discord.activity | quote }}
          {{- end }}
          {{- if $values.discord.status }}
          status: {{ $values.discord.status | quote }}
          {{- end }}
          accounts:
          {{- range $id, $cfg := $values.discord.accounts }}
            {{ $id }}:
              name: {{ $cfg.name | quote }}
              {{- if $cfg.tokenEnvVar }}
              token: {{ printf "${%s}" $cfg.tokenEnvVar | quote }}
              {{- end }}
              {{- if $cfg.commands }}
              commands:
                {{- toYaml $cfg.commands | nindent 16 }}
              {{- end }}
              {{- if $cfg.actions }}
              actions:
                {{- toYaml $cfg.actions | nindent 16 }}
              {{- end }}
              {{- if $cfg.activity }}
              activity: {{ $cfg.activity | quote }}
              {{- end }}
              {{- if $cfg.status }}
              status: {{ $cfg.status | quote }}
              {{- end }}
              {{- if $cfg.allowFrom }}
              allowFrom:
                {{- toYaml $cfg.allowFrom | nindent 16 }}
              {{- end }}
              {{- if $cfg.dmPolicy }}
              dmPolicy: {{ $cfg.dmPolicy | quote }}
              {{- end }}
              {{- if $cfg.dm }}
              dm:
                {{- toYaml $cfg.dm | nindent 16 }}
              {{- end }}
              groupPolicy: {{ $cfg.groupPolicy | quote }}
              streaming: {{ $cfg.streaming | quote }}
              {{- if $cfg.guilds }}
              guilds:
                {{- toYaml $cfg.guilds | nindent 16 }}
              {{- end }}
          {{- end }}
          {{- if not $values.discord.accounts }}
            {}
          {{- end }}

      {{- if $values.gatewayRaw }}
      gateway:
        {{- toYaml $values.gatewayRaw | nindent 8 }}
      {{- end }}
      {{- if $values.commandsRaw }}
      commands:
        {{- toYaml $values.commandsRaw | nindent 8 }}
      {{- end }}
      {{- if $values.sessionRaw }}
      session:
        {{- toYaml $values.sessionRaw | nindent 8 }}
      {{- end }}
      {{- if $values.messagesRaw }}
      messages:
        {{- toYaml $values.messagesRaw | nindent 8 }}
      {{- end }}
      {{- if $values.hooksRaw }}
      hooks:
        {{- toYaml $values.hooksRaw | nindent 8 }}
      {{- end }}
      {{- if $values.toolsRaw }}
      tools:
        {{- toYaml $values.toolsRaw | nindent 8 }}
      {{- end }}
      {{- if $values.configRawExtra }}
      {{- toYaml $values.configRawExtra | nindent 6 }}
      {{- end }}

  workspace:
    initialDirectories:
    {{- range $values.workspace.initialDirectories }}
      - {{ . | quote }}
    {{- end }}
    initialFiles:
    {{- range $path, $content := $values.workspace.initialFiles }}
      {{ $path | quote }}: {{ $content | quote }}
    {{- end }}

  {{- if $values.networking }}
  networking:
    {{- toYaml $values.networking | nindent 4 }}
  {{- end }}
  {{- if $values.security }}
  security:
    {{- toYaml $values.security | nindent 4 }}
  {{- end }}
  {{- if $values.probes }}
  probes:
    {{- toYaml $values.probes | nindent 4 }}
  {{- end }}
  {{- if $values.skills }}
  skills:
    {{- toYaml $values.skills | nindent 4 }}
  {{- end }}
