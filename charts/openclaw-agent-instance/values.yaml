nameOverride: ""
fullnameOverride: ""

# Generic chart defaults (deployment-specific identity belongs in app values files).
instance:
  name: openclaw-instance

secretRefs:
  # Optional overrides. When empty, names are derived from fullname:
  # <fullname>-provider-secrets, <fullname>-discord-secrets, <fullname>-gateway-token
  providerSecret: ""
  discordSecret: ""
  gatewayTokenSecret: ""

agents:
  main:
    id: main
    name: Assistant
    workspace: /home/openclaw/.openclaw/workspace/main
    model: {}
  subagents: []
  subagentsMap: {}

models:
  providers: {}
  defaultModel: {}

discord:
  # Disabled by default to keep the base chart portable.
  enabled: false
  tokenEnvVar: DISCORD_TOKEN
  groupPolicy: allowlist
  streaming: block
  configWrites: null
  blockStreaming: null
  accounts: {}
  bindings: []
  bindingsMap: {}

gatewayRaw: {}
commandsRaw: {}
sessionRaw: {}
messagesRaw: {}
hooksRaw: {}
toolsRaw: {}

workspace:
  initialDirectories:
    - main
  initialFiles: {}

networking:
  ingress:
    enabled: false
    className: tailscale
    annotations: {}
    hosts: []
    tls: []

security: {}

probes:
  startup:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 120
  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  liveness:
    enabled: true
    initialDelaySeconds: 45
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
