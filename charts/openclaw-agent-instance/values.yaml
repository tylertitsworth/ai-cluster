nameOverride: ""
fullnameOverride: ""

# Generic chart defaults (deployment-specific identity belongs in app values files).
instance:
  name: openclaw-instance

secretRefs:
  # Provide these secrets in the target namespace.
  providerSecret: openclaw-provider-secrets
  discordSecret: openclaw-discord-secrets
  gatewayTokenSecret: openclaw-gateway-token

agents:
  main:
    id: main
    name: Assistant
    workspace: /home/node/.openclaw/workspace/main
  subagents: []

discord:
  # Disabled by default to keep the base chart portable.
  enabled: false
  tokenEnvVar: DISCORD_TOKEN
  groupPolicy: allowlist
  streaming: block
  accounts: {}
  bindings: []

workspace:
  initialDirectories:
    - main
  initialFiles: {}

networking:
  ingress:
    enabled: false
    className: tailscale
    annotations: {}
    hosts: []
    tls: []

networkPolicy: {}

probes:
  startup:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 120
  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  liveness:
    enabled: true
    initialDelaySeconds: 45
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
