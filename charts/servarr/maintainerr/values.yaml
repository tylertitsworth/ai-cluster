app-template:
  defaultPodOptions:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  controllers:
    maintainerr:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: ghcr.io/maintainerr/maintainerr
            tag: latest
            pullPolicy: Always

          env:
            TZ: America/Los_Angeles

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 6246
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 6246
                initialDelaySeconds: 30
                periodSeconds: 10

          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 1Gi

  service:
    main:
      controller: maintainerr
      ports:
        http:
          port: 6246

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: maintainerr
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
      tls:
        - hosts:
            - maintainerr

  persistence:
    data:
      enabled: true
      existingClaim: maintainerr-config
      globalMounts:
        - path: /opt/data
