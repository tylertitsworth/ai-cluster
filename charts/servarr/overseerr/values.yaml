app-template:
  controllers:
    overseerr:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: ghcr.io/seerr-team/seerr
            tag: latest
            pullPolicy: Always

          env:
            TZ: America/Los_Angeles
            PUID: "1000"
            PGID: "1000"
            # Log level: debug, info, warn, error
            LOG_LEVEL: info

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/v1/status
                  port: 5055
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/v1/status
                  port: 5055
                initialDelaySeconds: 30
                periodSeconds: 10

          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 1Gi

  service:
    main:
      controller: overseerr
      ports:
        http:
          port: 5055

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: overseerr
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
        tailscale.com/funnel: "true"
      tls:
        - hosts:
            - overseerr

  persistence:
    config:
      enabled: true
      existingClaim: overseer-config
      globalMounts:
        - path: /config
