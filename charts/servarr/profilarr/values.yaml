app-template:
  controllers:
    profilarr:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: santiagosayshey/profilarr
            tag: beta  # Use beta for ARM64 support
            pullPolicy: Always

          env:
            TZ: America/Los_Angeles

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 6868
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 6868
                initialDelaySeconds: 30
                periodSeconds: 10

          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi


  service:
    main:
      controller: profilarr
      ports:
        http:
          port: 6868

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: profilarr
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
      tls:
        - hosts:
            - profilarr

  persistence:
    config:
      enabled: true
      existingClaim: profilarr-config
      globalMounts:
        - path: /config
