app-template:
  controllers:
    clawdbot:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: moltbot/moltbot
            tag: "2026.1.24"
            pullPolicy: IfNotPresent

          # Run gateway with LAN binding for container networking
          command: ["node", "dist/entry.js"]
          args: ["gateway", "--bind", "lan"]

          env:
            TZ: America/Los_Angeles
            # Config and state directories (matches container defaults)
            HOME: /home/node

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 18789
                initialDelaySeconds: 30
                periodSeconds: 30
                timeoutSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 18789
                initialDelaySeconds: 15
                periodSeconds: 10
                timeoutSeconds: 5

          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 2Gi

        # Config watchdog - monitors config changes and restores backup if gateway becomes unhealthy
        watchdog:
          image:
            repository: alpine
            tag: "3.19"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache inotify-tools curl >/dev/null 2>&1
              
              CONFIG="/home/node/.clawdbot/clawdbot.json"
              BACKUP_DIR="/home/node/.clawdbot/watchdog-backups"
              HEALTH_URL="http://localhost:18789/"
              TIMEOUT=30
              POLL_INTERVAL=2
              
              mkdir -p "$BACKUP_DIR"
              
              # Wait for config file to exist
              while [ ! -f "$CONFIG" ]; do
                echo "[watchdog] Waiting for config file..."
                sleep 5
              done
              
              # Save initial known-good config
              cp "$CONFIG" "$BACKUP_DIR/last-known-good.json"
              echo "[watchdog] Saved initial config as last-known-good"
              
              # Watch for config changes
              inotifywait -m -e close_write "$CONFIG" | while read -r dir events file; do
                echo "[watchdog] Config change detected, monitoring health..."
                
                # Save pre-change backup
                cp "$BACKUP_DIR/last-known-good.json" "$BACKUP_DIR/pre-change.json"
                
                # Wait for gateway to become healthy
                elapsed=0
                healthy=false
                while [ $elapsed -lt $TIMEOUT ]; do
                  if curl -sf "$HEALTH_URL" > /dev/null 2>&1; then
                    # Healthy - promote current config to last-known-good
                    cp "$CONFIG" "$BACKUP_DIR/last-known-good.json"
                    echo "[watchdog] Config validated, health OK after ${elapsed}s"
                    healthy=true
                    break
                  fi
                  sleep $POLL_INTERVAL
                  elapsed=$((elapsed + POLL_INTERVAL))
                done
                
                # If we exhausted timeout, restore backup
                if [ "$healthy" = "false" ]; then
                  echo "[watchdog] Health check failed after ${TIMEOUT}s, restoring backup"
                  cp "$BACKUP_DIR/pre-change.json" "$CONFIG"
                  echo "[watchdog] Backup restored, gateway will restart"
                fi
              done
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi

  service:
    main:
      controller: clawdbot
      ports:
        http:
          port: 18789

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: clawdbot
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
      tls:
        - hosts:
            - clawdbot

  persistence:
    # Main config directory containing clawdbot.json, agents, memory, sessions
    config:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 5Gi
      globalMounts:
        - path: /home/node/.clawdbot

    # Main agent workspace directory
    workspace:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
      globalMounts:
        - path: /home/node/clawd
