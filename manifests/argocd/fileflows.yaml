# FileFlows - Media File Processing & Transcoding Server
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fileflows
  namespace: argocd
  labels:
    stack: servarr
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/tylertitsworth/ai-cluster.git
    targetRevision: servarr-stack
    path: manifests/servarr/apps/fileflows
  destination:
    server: https://kubernetes.default.svc
    namespace: servarr
  syncPolicy:
    # Manual sync only
    syncOptions:
    - CreateNamespace=true

