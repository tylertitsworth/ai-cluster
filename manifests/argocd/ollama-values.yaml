# ollama chart values for AMD ROCm + Tailscale ingress
fullnameOverride: ollama

image:
  repository: ollama/ollama
  # Pinned latest versioned ROCm image tag
  tag: 0.17.7-rocm
  pullPolicy: Always

ollama:
  gpu:
    enabled: true
    type: amd
    number: 1

extraEnv:
  # Force Vulkan backend on AMD where supported
  # - name: OLLAMA_LLM_LIBRARY
  #   value: vulkan
  # # Explicitly enable experimental Vulkan runtime path
  # - name: OLLAMA_VULKAN
  #   value: "1"
  # Explicitly enable experimental flash attention
  - name: OLLAMA_FLASH_ATTENTION
    value: "1"
  # 12K default context length (KV cache-backed token window)
  - name: OLLAMA_CONTEXT_LENGTH
    value: "16384"
  # Allow up to 30 minutes for large model load stalls
  - name: OLLAMA_LOAD_TIMEOUT
    value: 30m
  # Keep loaded models in memory indefinitely (never unload on idle)
  - name: OLLAMA_KEEP_ALIVE
    value: "-1"
  # Keep only one model loaded in memory at a time
  - name: OLLAMA_MAX_LOADED_MODELS
    value: "1"

service:
  type: ClusterIP
  port: 11434

ingress:
  enabled: true
  className: tailscale
  annotations:
    tailscale.com/proxy-class: "control-plane"
  hosts:
    - host: ollama
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - ollama

persistentVolume:
  enabled: true
  existingClaim: ollama-data

nodeSelector:
  kubernetes.io/hostname: framework-desktop

extraObjects:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: ollama-data
      namespace: ollama
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 60Gi
