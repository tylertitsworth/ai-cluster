# Tranga - Self-hosted manga downloader and monitor
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tranga
  namespace: argocd
  labels:
    stack: servarr
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/tylertitsworth/ai-cluster.git
    targetRevision: servarr-stack
    path: manifests/servarr/apps/tranga
  destination:
    server: https://kubernetes.default.svc
    namespace: servarr
  syncPolicy:
    # Disabled auto-sync for testing
    # automated:
    #   prune: true
    #   selfHeal: true
    syncOptions:
    - CreateNamespace=true
