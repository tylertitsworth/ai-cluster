# Service exposing the Ray Dashboard (serve-svc already covers port 8000)
apiVersion: v1
kind: Service
metadata:
  name: langgraph-serve-dashboard
  namespace: langgraph-serve
spec:
  selector:
    ray.io/node-type: head
  ports:
    - port: 8265
      targetPort: 8265
      name: dashboard
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langgraph-serve
  namespace: langgraph-serve
  labels:
    tailscale.com/proxy-class: control-plane
spec:
  ingressClassName: tailscale
  rules:
    - host: langgraph
      http:
        paths:
          - backend:
              service:
                name: langgraph-serve-serve-svc
                port:
                  number: 8000
            path: /serve
            pathType: Prefix
          - backend:
              service:
                name: langgraph-serve-dashboard
                port:
                  number: 8265
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - langgraph
