apiVersion: ray.io/v1
kind: RayService
metadata:
  name: langgraph-serve
  namespace: langgraph-serve
spec:
  serviceUnhealthySecondThreshold: 300
  deploymentUnhealthySecondThreshold: 300
  serveConfigV2: |
    applications:
      - name: langgraph-agent
        route_prefix: /serve
        import_path: serve:app
        deployments:
          - name: LangGraphService
            num_replicas: 1
            ray_actor_options:
              num_cpus: 1
  rayClusterConfig:
    rayVersion: "2.54.0"
    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "0"
      template:
        spec:
          nodeSelector:
            kubernetes.io/hostname: framework-desktop
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: langgraph-serve-data
          containers:
            - name: ray-head
              image: totalsundae/dev:langserve
              imagePullPolicy: Always
              env:
                - name: OLLAMA_BASE_URL
                  value: "http://ollama.ollama.svc.cluster.local:11434"
                - name: OLLAMA_MODEL
                  value: "nemotron-3-nano-30b-full"
                - name: CHECKPOINT_DB
                  value: "/data/checkpoints.db"
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                limits:
                  cpu: "2"
                  memory: 8Gi
                requests:
                  cpu: "1"
                  memory: 4Gi
              ports:
                - containerPort: 6379
                  name: gcs
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
    workerGroupSpecs:
      - groupName: workers
        replicas: 1
        minReplicas: 1
        maxReplicas: 1
        rayStartParams: {}
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: framework-desktop
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: langgraph-serve-data
            containers:
              - name: ray-worker
                image: totalsundae/dev:langserve
                imagePullPolicy: Always
                env:
                  - name: OLLAMA_BASE_URL
                    value: "http://ollama.ollama.svc.cluster.local:11434"
                  - name: OLLAMA_MODEL
                    value: "nemotron-3-nano-30b-full"
                  - name: CHECKPOINT_DB
                    value: "/data/checkpoints.db"
                volumeMounts:
                  - name: data
                    mountPath: /data
                resources:
                  limits:
                    cpu: "2"
                    memory: 8Gi
                  requests:
                    cpu: "1"
                    memory: 4Gi
