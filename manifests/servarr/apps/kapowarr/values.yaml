app-template:
  controllers:
    kapowarr:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: mrcas/kapowarr
            tag: latest
            pullPolicy: IfNotPresent

          env:
            TZ: America/Los_Angeles
            PUID: "1000"
            PGID: "1000"
            COMICVINE_API_KEY: "74707e9a077a5e954862ba6a0138a06b1a3553c5"

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 5656
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 5656
                initialDelaySeconds: 30
                periodSeconds: 10

          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi

  service:
    main:
      controller: kapowarr
      ports:
        http:
          port: 5656

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: kapowarr
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
      tls:
        - hosts:
            - kapowarr

  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      globalMounts:
        - path: /app/db

    media:
      enabled: true
      existingClaim: media-library
      globalMounts:
        - path: /media
          readOnly: false

    downloads:
      enabled: true
      existingClaim: downloads
      globalMounts:
        - path: /downloads
          readOnly: false

