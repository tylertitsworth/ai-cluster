app-template:
  controllers:
    komf:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: sndxr/komf
            tag: latest
            pullPolicy: IfNotPresent

          env:
            TZ: America/Los_Angeles

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 8085
                initialDelaySeconds: 60
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 8085
                initialDelaySeconds: 30
                periodSeconds: 10

          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 1Gi

  service:
    main:
      controller: komf
      ports:
        http:
          port: 8085

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: komf
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
      tls:
        - hosts:
            - komf

  configMaps:
    config:
      data:
        application.yml: |
          komf:
            kavita:
              baseUri: "http://kavita.servarr.svc.cluster.local:5000"
              apiKey: "34d9d9b7-f198-4197-840f-c968a1ae0c6b"
              notifications:
                libraries: []
            
            server:
              port: 8085
            
            database:
              file: /data/database.sqlite
            
            metadataProviders:
              malClientId: ""
              defaultProviders:
                manga:
                  priority:
                    - MANGA_UPDATES
                    - MAL
                    - ANILIST
                    - NAUTILJON
                    - YEN_PRESS
                    - KODANSHA
                    - VIZ
                    - BOOK_WALKER
                  aggregate: false
              mangaUpdates: {}
              mal: {}
              aniList: {}
              nautiljon: {}
              yenPress: {}
              kodansha: {}
              viz: {}
              bookWalker: {}

  persistence:
    # Config from ConfigMap (application.yml)
    config:
      enabled: true
      type: configMap
      name: komf-config
      globalMounts:
        - path: /config/application.yml
          subPath: application.yml
          readOnly: true

    # Data directory for database
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      globalMounts:
        - path: /data
