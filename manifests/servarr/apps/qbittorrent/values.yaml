app-template:
  controllers:
    qbittorrent:
      replicas: 1
      strategy: Recreate

      containers:
        # Gluetun VPN container
        gluetun:
          image:
            repository: qmcgaw/gluetun
            tag: v3.39.1
            pullPolicy: IfNotPresent

          env:
            # VPN Provider Configuration
            # These will be overridden by the vpn-config secret
            VPN_SERVICE_PROVIDER: "mullvad"  # Default, override in secret
            VPN_TYPE: "wireguard"  # Default, override in secret

            # General settings
            TZ: "America/Los_Angeles"
            FIREWALL_OUTBOUND_SUBNETS: "10.0.0.0/8,192.168.0.0/16,172.16.0.0/12"  # Allow local network access
            FIREWALL_INPUT_PORTS: "8080,6881"  # qBittorrent WebUI and BitTorrent port

            # Kill switch - CRITICAL for VPN
            FIREWALL: "on"
            DOT: "off"
            DNS_KEEP_NAMESERVER: "off"

          # Load VPN credentials from secret
          envFrom:
            - secretRef:
                name: vpn-config
                optional: false

          # Run as privileged for VPN networking
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
            privileged: true

          probes:
            liveness:
              enabled: false  # Gluetun handles this internally
            readiness:
              enabled: false

        # qBittorrent container
        qbittorrent:
          image:
            repository: lscr.io/linuxserver/qbittorrent
            tag: 4.6.2
            pullPolicy: IfNotPresent

          # Route all traffic through Gluetun - shares network namespace
          dependsOn:
            - gluetun

          env:
            TZ: America/Los_Angeles
            PUID: "1000"
            PGID: "1000"
            WEBUI_PORT: "8080"
            DOCKER_MODS: "ghcr.io/gabe565/linuxserver-mod-vuetorrent"

          # Use Gluetun's network stack
          # This is done via pod settings below

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 8080
                initialDelaySeconds: 60  # Give VPN time to connect
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 8080
                initialDelaySeconds: 60
                periodSeconds: 10

          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 4Gi
              cpu: 2000m

      pod:
        # Use host network for VPN to work properly
        hostNetwork: false

        # DNS configuration for VPN
        dnsPolicy: "None"
        dnsConfig:
          nameservers:
            - 1.1.1.1
            - 1.0.0.1

  service:
    main:
      controller: qbittorrent
      ports:
        http:
          port: 8080

    # BitTorrent port through VPN
    bittorrent:
      controller: qbittorrent
      type: LoadBalancer
      loadBalancerIP: 192.168.1.90
      ports:
        tcp:
          enabled: true
          port: 6881
          protocol: TCP
          targetPort: 6881
        udp:
          enabled: true
          port: 6881
          protocol: UDP
          targetPort: 6881

  # Ingress for web UI (still accessible locally)
  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: qbittorrent
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
      tls:
        - hosts:
            - qbittorrent

  persistence:
    config:
      enabled: true
      existingClaim: qbittorrent-config
      globalMounts:
        - path: /config

    downloads:
      enabled: true
      existingClaim: downloads
      globalMounts:
        - path: /downloads

    media:
      enabled: true
      existingClaim: media-library
      globalMounts:
        - path: /media

    # Gluetun config (optional, for persistent VPN config)
    gluetun-config:
      enabled: false
      type: emptyDir
      globalMounts:
        - path: /gluetun

  # Create a secret for VPN credentials
  # kubectl create secret generic vpn-config -n servarr \
  #   --from-literal=WIREGUARD_PRIVATE_KEY=your_key \
  #   --from-literal=VPN_USERNAME=your_username \
  #   --from-literal=VPN_PASSWORD=your_password