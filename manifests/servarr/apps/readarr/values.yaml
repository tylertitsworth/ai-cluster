app-template:
  controllers:
    readarr:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: lscr.io/linuxserver/readarr
            tag: 0.4.3-develop
            pullPolicy: IfNotPresent

          env:
            TZ: America/Los_Angeles
            PUID: "1000"
            PGID: "1000"

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /ping
                  port: 8787
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /ping
                  port: 8787
                initialDelaySeconds: 30
                periodSeconds: 10

          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 1Gi


  service:
    main:
      controller: readarr
      ports:
        http:
          port: 8787

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: readarr
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
      tls:
        - hosts:
            - readarr

  persistence:
    config:
      enabled: true
      existingClaim: readarr-config
      globalMounts:
        - path: /config

    media:
      enabled: true
      existingClaim: media-library
      globalMounts:
        - path: /media
          readOnly: false

    downloads:
      enabled: true
      existingClaim: downloads
      globalMounts:
        - path: /downloads
          readOnly: false
