app-template:
  controllers:
    sonarr:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: lscr.io/linuxserver/sonarr
            tag: 4.0.11
            pullPolicy: IfNotPresent

          env:
            TZ: America/Los_Angeles
            PUID: "1000"
            PGID: "1000"

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /ping
                  port: 8989
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /ping
                  port: 8989
                initialDelaySeconds: 30
                periodSeconds: 10

          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 2Gi

  service:
    main:
      controller: sonarr
      ports:
        http:
          port: 8989

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: sonarr
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - sonarr

  persistence:
    config:
      enabled: true
      existingClaim: sonarr-config
      globalMounts:
        - path: /config

    media:
      enabled: true
      existingClaim: media-library
      globalMounts:
        - path: /media
          readOnly: false

    downloads:
      enabled: true
      existingClaim: downloads
      globalMounts:
        - path: /downloads
          readOnly: false
