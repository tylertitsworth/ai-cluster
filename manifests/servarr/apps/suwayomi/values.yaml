app-template:
  controllers:
    suwayomi:
      replicas: 1
      strategy: Recreate

      pod:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch

      containers:
        main:
          image:
            repository: ghcr.io/suwayomi/suwayomi-server
            tag: stable
            pullPolicy: IfNotPresent

          env:
            TZ: America/Los_Angeles
            BIND_IP: "0.0.0.0"
            BIND_PORT: "4567"
            DOWNLOAD_AS_CBZ: "true"
            AUTO_DOWNLOAD_NEW_CHAPTERS: "false"

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 4567
                initialDelaySeconds: 60
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 4567
                initialDelaySeconds: 30
                periodSeconds: 10

          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 2Gi

  service:
    main:
      controller: suwayomi
      ports:
        http:
          port: 4567

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: suwayomi
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
      tls:
        - hosts:
            - suwayomi

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 50Gi
      globalMounts:
        - path: /home/suwayomi/.local/share/Tachidesk

    media:
      enabled: true
      existingClaim: media-library
      globalMounts:
        - path: /media
          readOnly: false

    downloads:
      enabled: true
      existingClaim: downloads
      globalMounts:
        - path: /downloads
          readOnly: false
