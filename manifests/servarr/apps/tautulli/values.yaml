app-template:
  controllers:
    tautulli:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: lscr.io/linuxserver/tautulli
            tag: 2.14.6
            pullPolicy: IfNotPresent

          env:
            TZ: America/Los_Angeles
            PUID: "1000"
            PGID: "1000"

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /status
                  port: 8181
                initialDelaySeconds: 60
                periodSeconds: 30
                timeoutSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /status
                  port: 8181
                initialDelaySeconds: 30
                periodSeconds: 10

          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 1Gi

  service:
    main:
      controller: tautulli
      ports:
        http:
          port: 8181

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: tautulli
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
      tls:
        - hosts:
            - tautulli

  persistence:
    config:
      enabled: true
      existingClaim: tautulli-config
      globalMounts:
        - path: /config

    # Mount Plex logs for LogViewer feature
    plex-logs:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: pms-config-plex-0
      globalMounts:
        - path: /plexlogs
          subPath: Library/Application Support/Plex Media Server/Logs
          readOnly: true
