app-template:
  global:
    fullnameOverride: tranga

  controllers:
    # PostgreSQL database
    tranga-pg:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: postgres
            tag: "17"
            pullPolicy: IfNotPresent

          env:
            POSTGRES_USER: tranga
            POSTGRES_PASSWORD: tranga
            POSTGRES_DB: tranga
            PGDATA: /var/lib/postgresql/data/pgdata

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - pg_isready
                    - -U
                    - tranga
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - pg_isready
                    - -U
                    - tranga
                initialDelaySeconds: 10
                periodSeconds: 10

          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi

    # Tranga API backend
    tranga-api:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: glax/tranga-api
            tag: latest
            pullPolicy: IfNotPresent

          env:
            TZ: America/Los_Angeles
            POSTGRES_HOST: tranga-pg:5432
            POSTGRES_DB: tranga
            POSTGRES_USER: tranga
            POSTGRES_PASSWORD: tranga
            DOWNLOAD_LOCATION: /manga

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /swagger
                  port: 6531
                initialDelaySeconds: 60
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /swagger
                  port: 6531
                initialDelaySeconds: 30
                periodSeconds: 10

          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi

    # Tranga website frontend
    tranga-website:
      replicas: 1
      strategy: Recreate

      containers:
        main:
          image:
            repository: glax/tranga-website
            tag: latest
            pullPolicy: IfNotPresent

          env:
            TZ: America/Los_Angeles
            TRANGA_API_URL: http://tranga-api:6531

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 80
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 80
                initialDelaySeconds: 10
                periodSeconds: 10

          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 256Mi

  service:
    tranga-pg:
      controller: tranga-pg
      ports:
        postgres:
          port: 5432

    tranga-api:
      controller: tranga-api
      ports:
        http:
          port: 6531

    tranga-website:
      controller: tranga-website
      ports:
        http:
          port: 80

  ingress:
    main:
      enabled: true
      className: tailscale
      hosts:
        - host: tranga
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: tranga-website
                port: http
      annotations:
        tailscale.com/proxy-class: "control-plane"
      tls:
        - hosts:
            - tranga

  persistence:
    pg-data:
      enabled: true
      existingClaim: tranga-pg-data
      advancedMounts:
        tranga-pg:
          main:
            - path: /var/lib/postgresql/data

    api-config:
      enabled: true
      existingClaim: tranga-api-config
      advancedMounts:
        tranga-api:
          main:
            - path: /usr/share/tranga-api

    manga:
      enabled: true
      existingClaim: media-library
      advancedMounts:
        tranga-api:
          main:
            - path: /manga
              subPath: manga
