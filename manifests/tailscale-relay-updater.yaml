apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-relay-updater
  namespace: tailscale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-relay-updater
  namespace: tailscale
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-relay-updater
  namespace: tailscale
subjects:
  - kind: ServiceAccount
    name: tailscale-relay-updater
    namespace: tailscale
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tailscale-relay-updater
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tailscale-relay-updater
  namespace: tailscale
spec:
  # Check frequently; no-op when IP has not changed.
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: tailscale-relay-updater
          restartPolicy: OnFailure
          containers:
            - name: updater
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              env:
                - name: RELAY_PORT
                  value: "40000"
                - name: STATE_CONFIGMAP
                  value: tailscale-relay-updater-state
                - name: POD_SELECTOR
                  value: tailscale.com/parent-resource=egress,tailscale.com/parent-resource-type=proxygroup
              command:
                - /bin/sh
                - -ec
                - |
                  apk add --no-cache curl kubectl >/dev/null

                  RELAY_PORT="${RELAY_PORT:-40000}"
                  STATE_CONFIGMAP="${STATE_CONFIGMAP:-tailscale-relay-updater-state}"
                  POD_SELECTOR="${POD_SELECTOR:-tailscale.com/parent-resource=egress,tailscale.com/parent-resource-type=proxygroup}"

                  PUBLIC_IP="$(curl -fsS --max-time 10 https://ifconfig.me || curl -fsS --max-time 10 https://api.ipify.org)"
                  if ! echo "${PUBLIC_IP}" | grep -Eq '^[0-9]{1,3}(\.[0-9]{1,3}){3}$'; then
                    echo "invalid public IP: ${PUBLIC_IP}" >&2
                    exit 1
                  fi

                  LAST_IP="$(kubectl -n tailscale get configmap "${STATE_CONFIGMAP}" -o jsonpath='{.data.lastPublicIP}' 2>/dev/null || true)"
                  if [ "${PUBLIC_IP}" = "${LAST_IP}" ]; then
                    echo "public IP unchanged (${PUBLIC_IP}); skipping."
                    exit 0
                  fi

                  PODS="$(kubectl -n tailscale get pods -l "${POD_SELECTOR}" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')"
                  if [ -z "${PODS}" ]; then
                    echo "no egress pods found for selector: ${POD_SELECTOR}" >&2
                    exit 1
                  fi

                  # Update one pod at a time with retries to preserve availability.
                  for POD in ${PODS}; do
                    ATTEMPT=1
                    SUCCESS=0
                    while [ "${ATTEMPT}" -le 3 ]; do
                      echo "updating ${POD} attempt ${ATTEMPT}"
                      if kubectl -n tailscale exec "${POD}" -c tailscale -- tailscale set --relay-server-port="${RELAY_PORT}" --relay-server-static-endpoints="${PUBLIC_IP}:${RELAY_PORT}"; then
                        SUCCESS=1
                        kubectl -n tailscale exec "${POD}" -c tailscale -- tailscale debug peer-relay-servers || true
                        break
                      fi
                      sleep $((ATTEMPT * 5))
                      ATTEMPT=$((ATTEMPT + 1))
                    done

                    if [ "${SUCCESS}" -ne 1 ]; then
                      echo "failed updating ${POD} after retries" >&2
                      exit 1
                    fi
                  done

                  NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  kubectl -n tailscale create configmap "${STATE_CONFIGMAP}" \
                    --from-literal=lastPublicIP="${PUBLIC_IP}" \
                    --from-literal=lastUpdated="${NOW}" \
                    --dry-run=client -o yaml | kubectl apply -f -

                  echo "relay endpoints updated to ${PUBLIC_IP}:${RELAY_PORT}"
