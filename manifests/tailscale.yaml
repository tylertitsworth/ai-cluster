apiVersion: tailscale.com/v1alpha1
kind: DNSConfig
metadata:
  name: ts-dns
spec:
  nameserver:
    image:
      repo: tailscale/k8s-nameserver
      tag: unstable
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: control-plane
spec:
  statefulSet:
    pod:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
  metrics:
    enable: true
    serviceMonitor:
      enable: true
      labels:
        prometheus: monitoring-kube-prometheus-prometheus
        release: monitoring
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: relay-egress
spec:
  statefulSet:
    pod:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
---
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: control-plane
spec:
  proxyClass: control-plane
  subnetRouter:
    advertiseRoutes:
      - "10.42.0.0/15"
      - "10.43.0.0/16"
      - "192.168.0.64/27"
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: egress
spec:
  type: egress
  replicas: 2
  proxyClass: relay-egress
---
apiVersion: v1
kind: Service
metadata:
  name: egress
  namespace: tailscale
spec:
  type: NodePort
  selector:
    tailscale.com/parent-resource: egress
    tailscale.com/parent-resource-type: proxygroup
  ports:
    - port: 40000
      targetPort: 40000
      # NodePort must be in service-node-port-range (default 30000-32767).
      nodePort: 32000
      protocol: UDP
      name: egress-udp
---
apiVersion: v1
kind: Service
metadata:
  name: ai
  namespace: tailscale
  annotations:
    tailscale.com/tailnet-fqdn: "ai.tail79a5c8.ts.net"
    tailscale.com/proxy-group: "egress"
spec:
  type: ExternalName
  # Placeholder value required by K8s; the operator rewrites this service.
  externalName: placeholder
  ports:
    - name: https
      port: 443
      targetPort: 443
