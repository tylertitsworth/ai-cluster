apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  tailscale.server: |
    ts.net:53 {
      errors
      cache 30
      forward . 10.43.240.44
    }
---
apiVersion: tailscale.com/v1alpha1
kind: DNSConfig
metadata:
  name: ts-dns
spec:
  nameserver:
    image:
      repo: tailscale/k8s-nameserver
      tag: unstable
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: control-plane
spec:
  statefulSet:
    pod:
      nodeSelector:
        tailscale-ingress: "enabled"
      topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              tailscale.com/managed: "true"
  metrics:
    enable: true
    serviceMonitor:
      enable: true
      labels:
        prometheus: monitoring-kube-prometheus-prometheus
        release: monitoring
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: relay-egress
spec:
  statefulSet:
    pod:
      nodeSelector:
        tailscale-ingress: "enabled"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              tailscale.com/managed: "true"
  metrics:
    enable: true
    serviceMonitor:
      enable: true
      labels:
        prometheus: monitoring-kube-prometheus-prometheus
        release: monitoring
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: connector-host
spec:
  statefulSet:
    pod:
      nodeSelector:
        kubernetes.io/hostname: framework-desktop
  metrics:
    enable: true
    serviceMonitor:
      enable: true
      labels:
        prometheus: monitoring-kube-prometheus-prometheus
        release: monitoring
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: pin-npu01
spec:
  statefulSet:
    pod:
      nodeSelector:
        kubernetes.io/hostname: npu01.local
  metrics:
    enable: true
    serviceMonitor:
      enable: true
      labels:
        prometheus: monitoring-kube-prometheus-prometheus
        release: monitoring
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: pin-npu02
spec:
  statefulSet:
    pod:
      nodeSelector:
        kubernetes.io/hostname: npu02.local
  metrics:
    enable: true
    serviceMonitor:
      enable: true
      labels:
        prometheus: monitoring-kube-prometheus-prometheus
        release: monitoring
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: pin-framework-desktop
spec:
  statefulSet:
    pod:
      nodeSelector:
        kubernetes.io/hostname: framework-desktop
---
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: control-plane
spec:
  proxyClass: connector-host
  subnetRouter:
    advertiseRoutes:
      - "10.42.0.0/15"
      - "10.43.0.0/16"
      - "192.168.0.0/24"
      - "192.168.0.245/32"
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: egress
spec:
  type: egress
  replicas: 2
  proxyClass: relay-egress
---
apiVersion: v1
kind: Service
metadata:
  name: egress
  namespace: tailscale
spec:
  type: NodePort
  selector:
    tailscale.com/parent-resource: egress
    tailscale.com/parent-resource-type: proxygroup
  ports:
    - port: 40000
      targetPort: 40000
      # NodePort must be in service-node-port-range (default 30000-32767).
      nodePort: 32000
      protocol: UDP
      name: egress-udp
---
apiVersion: v1
kind: Service
metadata:
  name: ai
  namespace: tailscale
  annotations:
    tailscale.com/tailnet-fqdn: "ai.tail79a5c8.ts.net"
    tailscale.com/proxy-group: "egress"
spec:
  type: ExternalName
  # Placeholder value required by K8s; the operator rewrites this service.
  externalName: placeholder
  ports:
    - name: https
      port: 443
      targetPort: 443
